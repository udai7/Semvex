# Semvex full stack. Mirrors docs/production.md.
#
# Data plane: Postgres + pgvector is the source of truth (users, analytics,
# products, embeddings). Elasticsearch is the optional BM25 keyword engine — the
# app falls back to Postgres full-text (tsvector) if it's absent. On a small VPS
# you can drop `elasticsearch` (keyword → tsvector) and/or point DATABASE_URL at
# managed Postgres (e.g. Neon) instead of running the `postgres` service here.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-semvex}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-semvex}
      - POSTGRES_DB=${POSTGRES_DB:-semvex}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-semvex}"]
      interval: 5s
      timeout: 5s
      retries: 12

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      # Point at managed Postgres by setting DATABASE_URL in the environment;
      # defaults to the bundled `postgres` service.
      - DATABASE_URL=${DATABASE_URL:-postgresql://semvex:semvex@postgres:5432/semvex}
      - SEMVEX_SECRET=${SEMVEX_SECRET:-change-me-in-prod}
      - SEMVEX_ADMIN_EMAILS=${SEMVEX_ADMIN_EMAILS:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      # Embeddings: default hashing fallback; set provider=hf + HF_API_TOKEN to
      # offload query embeddings to the HuggingFace Inference API (no model RAM).
      - SEMVEX_EMBEDDING_PROVIDER=${SEMVEX_EMBEDDING_PROVIDER:-auto}
      - HF_API_TOKEN=${HF_API_TOKEN:-}
      # Keyword engine: Elasticsearch when reachable, else tsvector.
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ELASTICSEARCH_API_KEY=${ELASTICSEARCH_API_KEY:-}
      - SEMVEX_KEYWORD_ENGINE=${SEMVEX_KEYWORD_ENGINE:-auto}
      # Email (Gmail SMTP) for signup verification codes.
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-465}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_APP_PASSWORD=${SMTP_APP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SEMVEX_OAUTH_REDIRECT=${SEMVEX_OAUTH_REDIRECT:-http://localhost:3000/auth/google/callback}
      - SEMVEX_POST_LOGIN_REDIRECT=/search
      - SEMVEX_LOGIN_ERROR_REDIRECT=/signin#error
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - SEMVEX_API_URL=http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Single-node Elasticsearch — BM25 keyword engine. Small heap for a demo;
  # remove this service to fall back to Postgres tsvector.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

volumes:
  pg_data:
  es_data:
