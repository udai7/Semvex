# Semvex full stack. Mirrors docs/production.md.
#
# The bundled app runs its keyword + vector indexes in-process, so `api` and
# `frontend` alone are enough to demo. The `elasticsearch` service is included
# to match the documented production topology (BM25 baseline) — wire the API to
# it by reading ELASTICSEARCH_URL when you graduate off the in-process index.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      - SEMVEX_SECRET=${SEMVEX_SECRET:-change-me-in-prod}
      - SEMVEX_ADMIN_EMAILS=${SEMVEX_ADMIN_EMAILS:-}
      - EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-BAAI/bge-small-en-v1.5}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      # - SUPABASE_URL / SUPABASE_SERVICE_KEY when moving vectors to pgvector
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - SEMVEX_OAUTH_REDIRECT=${SEMVEX_OAUTH_REDIRECT:-http://localhost:3000/auth/google/callback}
      - SEMVEX_POST_LOGIN_REDIRECT=/search
      - SEMVEX_LOGIN_ERROR_REDIRECT=/signin#error
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - SEMVEX_API_URL=http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"

  # Single-node Elasticsearch — documented BM25 baseline. Small heap for a demo.
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"

volumes:
  es_data:
