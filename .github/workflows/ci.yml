name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: semvex
          POSTGRES_PASSWORD: semvex
          POSTGRES_DB: semvex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U semvex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      # The app + tests run against the pgvector service. Elasticsearch is not
      # started here, so keyword search exercises the Postgres tsvector path.
      DATABASE_URL: postgresql://semvex:semvex@localhost:5432/semvex
      SEMVEX_TEST_DATABASE_URL: postgresql://semvex:semvex@localhost:5432/semvex
      SEMVEX_SECRET: ci-secret-stable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Seed catalog (for eval)
        run: python -m app.ingest
      - name: Evaluation harness
        run: python -m eval.evaluate

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
